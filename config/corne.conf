# Activa el soporte para el modo de suspensión profunda
CONFIG_ZMK_SLEEP=y

# Tiempo en milisegundos para entrar en suspensión profunda (15 minutos = 900000 ms)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Opcional: Si dejas los OLEDs, esto hace que se apaguen más rápido (ej. 15 segundos = 15000 ms)
CONFIG_ZMK_IDLE_TIMEOUT=15000

# Activar la pantalla OLED
CONFIG_ZMK_DISPLAY=y

# Activar los widgets de información (suelen venir por defecto, pero es mejor asegurarlos)
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Apagar la pantalla tras 15 segundos de inactividad (15000 ms)
CONFIG_ZMK_IDLE_TIMEOUT=15000
